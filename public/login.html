<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVS Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
    .logo{text-align:center;margin-bottom:32px}
    .logo h1{font-size:22px;font-weight:700;color:#1a1a2e}
    .logo p{font-size:13px;color:#666;margin-top:4px}
    label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:6px}
    input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;outline:none}
    input:focus{border-color:#4f46e5}
    .field{margin-bottom:18px}
    button{width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
    button:hover{background:#4338ca}
    .error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;display:none}
    .hint{margin-top:24px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#888}
    .hint strong{color:#555}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Product Verification System</h1>
    <p>Warehouse Management Portal</p>
  </div>
  <div class="error" id="errBox">Invalid email or password. Please try again.</div>
  <form method="POST" action="/login">
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@company.com" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit">Sign in</button>
  </form>
  <div class="hint">
    <strong>Demo accounts</strong> (password: password123)<br>
    manager@pvs.com &nbsp;·&nbsp; operator@pvs.com &nbsp;·&nbsp; qa@pvs.com
  </div>
</div>
<script>
  if(location.search.includes('error')) document.getElementById('errBox').style.display='block';
</script>
</body>
</html>
